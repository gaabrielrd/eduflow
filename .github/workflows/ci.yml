name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://eduflow:eduflow@localhost:5432/eduflow
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      JWT_ACCESS_TOKEN_EXPIRES_IN: 1h
      JWT_REFRESH_TOKEN_EXPIRES_IN: 30d
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: eduflow
      STORAGE_SECRET_KEY: eduflow123
      STORAGE_BUCKET_NAME: eduflow-media
      STORAGE_REGION: us-east-1
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: eduflow
          POSTGRES_USER: eduflow
          POSTGRES_PASSWORD: eduflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eduflow -d eduflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma Generate
        run: pnpm run api:prisma:generate

      - name: Start MinIO
        run: >
          docker run -d --name ci-minio
          -p 9000:9000
          -p 9001:9001
          -e MINIO_ROOT_USER=$STORAGE_ACCESS_KEY
          -e MINIO_ROOT_PASSWORD=$STORAGE_SECRET_KEY
          minio/minio:latest server /data --console-address ":9001"

      - name: Wait for MinIO
        run: >
          until curl -fsS http://127.0.0.1:9000/minio/health/live; do
          sleep 2;
          done

      - name: Provision MinIO bucket
        run: >
          docker run --rm --network host --entrypoint /bin/sh minio/mc -c
          "until mc alias set local http://127.0.0.1:9000 $STORAGE_ACCESS_KEY $STORAGE_SECRET_KEY; do sleep 2; done &&
          mc mb --ignore-existing local/$STORAGE_BUCKET_NAME &&
          mc anonymous set download local/$STORAGE_BUCKET_NAME"

      - name: Prisma Migrate Deploy
        run: pnpm run api:prisma:migrate:deploy

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
