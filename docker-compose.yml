services:
  postgres:
    image: postgres:17-alpine
    container_name: eduflow-postgres
    environment:
      POSTGRES_DB: eduflow
      POSTGRES_USER: eduflow
      POSTGRES_PASSWORD: eduflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduflow-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduflow -d eduflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduflow-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eduflow-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: eduflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eduflow
      MINIO_ROOT_PASSWORD: eduflow123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - eduflow-local

networks:
  eduflow-local:
    name: eduflow-local

volumes:
  postgres_data:
  redis_data:
  minio_data:
